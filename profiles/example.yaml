# ── PAR / STAR stories for open-ended questions ───────────────────────────
experience_corpus:
  - "At Acme I took on the monolith-to-microservices migration when the original
    lead left. Over 6 months I rewrote 4 core services in Go, coordinated with 3
    teams to align on contracts, and deployed with feature flags so we could roll
    back instantly. End result: p99 latency dropped from 1.2s to 0.7s, and the
    on-call load halved because each service could be debugged independently."

  - "The fraud ML pipeline at Beta was a 3-person project I ended up leading after
    month 2. The challenge was that our training data was heavily imbalanced —
    0.3% fraud rate. I introduced oversampling + a cost-sensitive loss function,
    which got precision up to 91% without killing recall. We also cut total
    pipeline runtime from 8 hours to 20 minutes by switching from batch CSV
    processing to Kafka-based streaming."

  - "I mentored two junior engineers at Acme. My approach: weekly 1-on-1s focused
    on one concrete skill per month, plus pairing on their first on-call shift so
    they weren't thrown in cold. Both got promoted within 18 months. One of them
    now mentors others using the same structure."
